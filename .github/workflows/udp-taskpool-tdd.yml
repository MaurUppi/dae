name: UDP TaskPool TDD (Linux eBPF)

on:
  push:
    branches:
      - broken-pipe-patch
    paths:
      - "control/udp_task_pool*.go"
      - "component/sniffing/quic*.go"
      - ".github/workflows/udp-taskpool-tdd.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "control/udp_task_pool*.go"
      - "component/sniffing/quic*.go"
      - ".github/workflows/udp-taskpool-tdd.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  tdd-race-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go 1.26
        run: |
          wget -q https://go.dev/dl/go1.26.0.linux-amd64.tar.gz
          sudo rm -rf /usr/local/go
          sudo tar -C /usr/local -xzf go1.26.0.linux-amd64.tar.gz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Install LLVM and Clang
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang llvm

      - name: Generate eBPF bindings
        run: |
          make ebpf

      - name: Init Test Artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p tdd-artifacts
          {
            echo "EVENT_NAME=${{ github.event_name }}"
            echo "REF_NAME=${{ github.ref_name }}"
            echo "SHA=${{ github.sha }}"
          } > tdd-artifacts/meta.env

      - name: Run UDP TaskPool tests with race detector
        shell: bash
        run: |
          set +e
          go test -v -race -timeout 30s ./control/... -run "Test(UdpTaskPool|CompareAndDelete|NoGoroutineLeak|ConvoyExitAfterFailedDelete|HighConcurrencyStress)" \
            2>&1 | tee tdd-artifacts/taskpool-race.log
          status=${PIPESTATUS[0]}
          set -e
          echo "TASKPOOL_TEST_STATUS=$status" >> tdd-artifacts/meta.env

      - name: Run QUIC header filter tests
        shell: bash
        run: |
          set +e
          go test -v ./component/sniffing -run "TestIsLikelyQuicInitialPacket" \
            2>&1 | tee tdd-artifacts/quic-filter.log
          status=${PIPESTATUS[0]}
          set -e
          echo "QUIC_TEST_STATUS=$status" >> tdd-artifacts/meta.env

      - name: Build PR Summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          # shellcheck disable=SC1091
          source tdd-artifacts/meta.env

          taskpool_status="${TASKPOOL_TEST_STATUS:-1}"
          quic_status="${QUIC_TEST_STATUS:-1}"

          pass_count=0
          if [[ "$taskpool_status" == "0" ]]; then
            pass_count=$((pass_count + 1))
          fi
          if [[ "$quic_status" == "0" ]]; then
            pass_count=$((pass_count + 1))
          fi

          overall="not pass"
          if [[ "$taskpool_status" == "0" && "$quic_status" == "0" ]]; then
            overall="pass"
          fi

          {
            echo "## UDP TaskPool TDD Summary"
            echo
            echo "- Ref: \`${REF_NAME}\`"
            echo "- Commit: \`${SHA}\`"
            echo "- Overall: **${overall}** (${pass_count}/2 passed)"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Full report artifact: \`udp-taskpool-tdd-${{ github.run_id }}\`"
            echo
            echo "### Test Status"
            echo
            if [[ "$taskpool_status" == "0" ]]; then
              echo "- ✅ \`go test -race ./control/... -run Test(UdpTaskPool|CompareAndDelete|NoGoroutineLeak|ConvoyExitAfterFailedDelete|HighConcurrencyStress)\`: pass"
            else
              echo "- ❌ \`go test -race ./control/... -run Test(UdpTaskPool|CompareAndDelete|NoGoroutineLeak|ConvoyExitAfterFailedDelete|HighConcurrencyStress)\`: failed (exit ${taskpool_status})"
            fi

            if [[ "$quic_status" == "0" ]]; then
              echo "- ✅ \`go test ./component/sniffing -run TestIsLikelyQuicInitialPacket\`: pass"
            else
              echo "- ❌ \`go test ./component/sniffing -run TestIsLikelyQuicInitialPacket\`: failed (exit ${quic_status})"
            fi
          } > tdd-artifacts/pr-summary.md

          cat tdd-artifacts/pr-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TDD Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: udp-taskpool-tdd-${{ github.run_id }}
          path: tdd-artifacts
          if-no-files-found: warn

      - name: Update PR Comment
        if: always() && github.event_name == 'pull_request' && hashFiles('tdd-artifacts/pr-summary.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- dae-udp-taskpool-tdd -->";
            const report = fs.readFileSync("tdd-artifacts/pr-summary.md", "utf8");
            const body = `${marker}\n${report}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Enforce Job Result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source tdd-artifacts/meta.env
          taskpool_status="${TASKPOOL_TEST_STATUS:-1}"
          quic_status="${QUIC_TEST_STATUS:-1}"
          if [[ "$taskpool_status" != "0" || "$quic_status" != "0" ]]; then
            echo "One or more test suites failed."
            exit 1
          fi
